<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Motion // Cinema Player</title>
    <style>
        :root {
            --void-blue: #010204;
            --blood-crimson: #600005;
            --bright-crimson: #90000a;
            --interface-white: rgba(255, 255, 255, 0.85);
            --interface-dim: rgba(255, 255, 255, 0.35);
            --chrome-safe-offset: 56px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--void-blue);
            cursor: none !important;
        }

        .shared-screen-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(6, 8, 12, 0.82);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .shared-screen-bar.bottom-bar {
            top: auto;
            bottom: 0;
            border-bottom: none;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding: 20px 40px;
        }

        .shared-screen-bar .bar-link,
        .shared-screen-bar .bar-title,
        .shared-screen-bar .bar-meta {
            font-family: monospace;
            font-size: 11px;
            text-transform: uppercase;
        }

        .shared-screen-bar .bar-link {
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            letter-spacing: 2px;
            transition: color 0.3s ease;
        }

        .shared-screen-bar .bar-link:hover {
            color: #f4f1e6;
        }

        .shared-screen-bar .bar-title,
        .shared-screen-bar .bar-meta {
            color: rgba(255, 255, 255, 0.68);
            letter-spacing: 3px;
        }

        #pageTransitionOverlay {
            position: fixed;
            inset: 0;
            background: var(--void-blue);
            pointer-events: none;
            z-index: 2147483646;
            opacity: 0;
            transition: opacity 0.8s ease;
            visibility: hidden;
            display: block;
        }

        #pageTransitionOverlay.fade-to-black {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        #pageTransitionOverlay.is-hidden {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
            display: none;
        }

        canvas, a, button {
            cursor: none !important;
        }

        /* --- ARTISTIC FILM GRAIN OVERLAY --- */
        .grain-overlay {
            position: fixed;
            top: -50%;
            left: -50%;
            right: -50%;
            bottom: -50%;
            width: 200%;
            height: 200%;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.055;                 
            mix-blend-mode: overlay;        
            pointer-events: none;
            z-index: 99997; 
            animation: grainShimmer 0.15s steps(4) infinite;
            will-change: transform;
        }

        @keyframes grainShimmer {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-1.5%, 0.5%); }
            50% { transform: translate(1%, -1%); }
            75% { transform: translate(-0.5%, -0.5%); }
            100% { transform: translate(0, 1%); }
        }

        /* --- COMPACT CROSSHAIR CURSOR WITH TARGET RING --- */
        #blobCursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 22px; 
            height: 22px;
            pointer-events: none;
            z-index: 99999;
            mix-blend-mode: screen;
            display: flex;
            align-items: center;
            justify-content: center;
            will-change: transform;
        }

        #blobCursor::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 1px;
            background: rgba(255, 255, 255, 0.7);
            box-shadow: 0 0 6px var(--blood-crimson);
            transition: transform 0.12s cubic-bezier(0.25, 1, 0.5, 1), background 0.2s ease, box-shadow 0.2s ease;
        }

        #blobCursor::after {
            content: '';
            position: absolute;
            width: 1px;
            height: 100%;
            background: rgba(255, 255, 255, 0.7);
            box-shadow: 0 0 6px var(--blood-crimson);
            transition: transform 0.12s cubic-bezier(0.25, 1, 0.5, 1), background 0.2s ease, box-shadow 0.2s ease;
        }

        .crosshair-core {
            position: absolute;
            width: 2.5px;
            height: 2.5px;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 8px #ffffff;
            z-index: 2;
            transition: transform 0.12s cubic-bezier(0.25, 1, 0.5, 1), background 0.2s ease, box-shadow 0.2s ease;
        }

        #blobCursor .crosshair-ring {
            position: absolute;
            width: 16px;
            height: 16px;
            border: 1px dashed rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            box-shadow: 0 0 4px rgba(255, 255, 255, 0.2);
            animation: targetSpin 8s linear infinite;
            z-index: 1;
            transition: transform 0.12s cubic-bezier(0.25, 1, 0.5, 1), border-color 0.2s ease, box-shadow 0.2s ease;
        }

        #blobCursor.is-clicked::before { transform: scaleX(1.4); }
        #blobCursor.is-clicked::after { transform: scaleY(1.4); }
        #blobCursor.is-clicked .crosshair-core { transform: scale(1.6); }
        #blobCursor.is-clicked .crosshair-ring { transform: scale(1.35); }

        @keyframes targetSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* --- DARKENED REVERSAL STATE --- */
        #blobCursor.is-darkened { mix-blend-mode: normal; }
        #blobCursor.is-darkened::before, #blobCursor.is-darkened::after {
            background: #111215; box-shadow: 0 0 3px rgba(255, 255, 255, 0.8);
        }
        #blobCursor.is-darkened .crosshair-core {
            background: #111215; box-shadow: 0 0 4px rgba(255, 255, 255, 0.9);
        }
        #blobCursor.is-darkened .crosshair-ring {
            border-color: rgba(17, 18, 21, 0.85); box-shadow: 0 0 3px rgba(255, 255, 255, 0.5);
        }

        /* --- CINEMATIC THEATER MODE --- */
        .cinema-body {
            background-color: #000000 !important;
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
        }

        .cinema-container {
            position: relative;
            width: 100%;
            height: calc(100% - (var(--chrome-safe-offset) * 2));
            margin-top: var(--chrome-safe-offset);
            margin-bottom: var(--chrome-safe-offset);
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Ambient side glow to soften letterbox bars when video is contained */
        .cinema-container::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 12% 50%, rgba(144, 0, 10, 0.45) 0%, rgba(144, 0, 10, 0.18) 28%, transparent 62%),
                radial-gradient(ellipse at 88% 50%, rgba(144, 0, 10, 0.42) 0%, rgba(144, 0, 10, 0.16) 30%, transparent 64%),
                radial-gradient(ellipse at 50% 50%, rgba(20, 6, 12, 0.55) 0%, rgba(0, 0, 0, 0.94) 72%);
            filter: blur(20px) saturate(120%);
            transform: scale(1.06);
            pointer-events: none;
            z-index: 0;
        }

        @media (max-width: 900px) {
            :root {
                --chrome-safe-offset: 52px;
            }
        }

        .video-element {
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 1;
        }

        .video-element iframe {
            width: 100%;
            height: 100%;
            border: 0;
            pointer-events: none;
        }

        .video-play-overlay {
            position: absolute;
            inset: 0;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, rgba(1, 2, 4, 0.2) 0%, rgba(1, 2, 4, 0.6) 100%);
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .video-play-overlay.is-hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .video-play-pill {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 14px 22px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 0px; /* Square/Minimalist theme aesthetic */
            background: rgba(1, 2, 4, 0.8);
            color: var(--interface-white);
            font-family: monospace;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            backdrop-filter: blur(8px);
            transition: border-color 0.3s ease, background 0.3s ease;
        }
        
        .video-play-pill:hover {
            border-color: var(--bright-crimson);
            background: var(--void-blue);
        }

        .play-feedback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.6);
            width: 84px;
            height: 84px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(1, 2, 4, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            opacity: 0;
            visibility: hidden;
            z-index: 5;
            transition: transform 240ms ease, opacity 240ms ease, visibility 240ms ease;
            pointer-events: none;
        }

        .play-feedback.is-visible {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            visibility: visible;
        }

        .play-feedback[data-state="pause"] svg {
            transform: translateX(0);
        }

        .play-feedback[data-state="play"] svg {
            transform: translateX(1px);
        }

        /* --- CONTROL WRAPPERS (TOP & BOTTOM) --- */
        .cinema-bottom-controls {
            position: absolute;
            left: 0;
            width: 100%;
            padding: 40px 50px;
            z-index: 10;
            transition: opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1), transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: auto;
        }

        .cinema-bottom-controls {
            bottom: 0;
            background: linear-gradient(to top, rgba(1, 2, 4, 0.95) 0%, rgba(1, 2, 4, 0) 100%);
            opacity: 0;
            transform: translateY(15px);
        }

        .cinema-container.controls-visible .cinema-bottom-controls {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .cinema-container:not(.controls-visible) .cinema-bottom-controls {
            opacity: 0;
            transform: translateY(-12px);
            pointer-events: none;
        }

        /* --- BOTTOM CONTROLS DESIGN --- */
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }

        .controls-group {
            display: flex;
            align-items: center;
            gap: 28px;
        }

        .cinema-control-icon {
            background: none;
            border: none;
            outline: none;
            color: var(--interface-white);
            display: flex;
            align-items: center;
            padding: 0;
            position: relative;
            z-index: 20;
            pointer-events: auto;
            transition: color 0.2s ease, transform 0.1s ease;
        }
        .cinema-control-icon:hover {
            color: var(--bright-crimson);
            transform: scale(1.05);
        }

        .audio-status-text {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            color: #ffffff;
        }
        .audio-mute-cross {
            position: absolute;
            inset: 0;
            transform: scale(0) rotate(-10deg);
            opacity: 0;
            transition: transform 220ms cubic-bezier(0.2,0.9,0.3,1), opacity 180ms ease;
            pointer-events: none;
            color: #ffffff;
        }
        .cinema-control-icon.is-muted .audio-mute-cross, #muteBtn.is-muted .audio-mute-cross {
            transform: scale(1) rotate(0deg);
            opacity: 1;
        }

        /* --- PROGRESS BAR SCRUBBER TRACK --- */
        .timeline-container {
            width: 100%;
            padding: 10px 0;
        }

        .timeline-bar {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.15);
            position: relative;
            border-radius: 0px;
            transition: height 0.15s ease, background-color 0.15s ease;
        }

        .timeline-container:hover .timeline-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.25);
        }

        .timeline-progress {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background: var(--bright-crimson);
            border-radius: 0px;
        }

        .timeline-handle {
            position: absolute;
            top: 50%;
            left: 0%;
            width: 10px;
            height: 10px;
            background: #ffffff;
            border: 1px solid var(--blood-crimson);
            border-radius: 0px; /* Hard-edged geometric aesthetic match */
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.15s ease;
            box-shadow: 0 0 8px var(--bright-crimson);
        }

        .timeline-container:hover .timeline-handle {
            transform: translate(-50%, -50%) scale(1);
        }

        /* --- VOLUME SLIDER LAYOUT --- */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cinema-volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 70px;
            background: rgba(255,255,255,0.15);
            height: 2px;
            outline: none;
            transition: width 0.2s ease, background 0.2s ease;
        }
        
        .cinema-volume-slider:hover {
            background: rgba(255,255,255,0.3);
        }

        .cinema-volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 8px;
            height: 8px;
            background: #ffffff;
            border-radius: 0px;
        }

        .time-display {
            font-family: monospace;
            font-size: 11px;
            letter-spacing: 1px;
            color: var(--interface-dim);
        }
    </style>
    <link rel="stylesheet" href="chrome.css">
</head>
<body class="cinema-body">
<header class="shared-screen-bar">
    <a class="bar-link" href="index.html">← HOME</a>
    <div class="bar-title">IN MOTION</div>
</header>
<div id="pageTransitionOverlay"></div>

    <div class="grain-overlay"></div>

    <div id="blobCursor">
        <div class="crosshair-core"></div>
        <div class="crosshair-ring"></div>
    </div>

    <div id="cinemaContainer" class="cinema-container controls-visible">
        
        <div id="shortFilmPlayer" class="video-element" aria-label="Short film player"></div>

        <div id="videoPlayOverlay" class="video-play-overlay">
            <div class="video-play-pill">
                <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24" aria-hidden="true">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                <span>Tap to play</span>
            </div>
        </div>

        <div id="playFeedback" class="play-feedback" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="currentColor" width="34" height="34">
                <path d="M8 5v14l11-7z"/>
            </svg>
        </div>

        <div class="cinema-bottom-controls">
            
            <div class="timeline-container">
                <div class="timeline-bar">
                    <div id="timelineProgress" class="timeline-progress"></div>
                    <div id="timelineHandle" class="timeline-handle"></div>
                </div>
            </div>

            <div class="controls-row">
                <div class="controls-group">
                    <button id="playPauseBtn" class="cinema-control-icon" aria-label="Play">
                        <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M8 5v14l11-7z"/></svg>
                        <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" width="22" height="22" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    </button>

                    <div class="volume-container">
                        <button id="muteBtn" class="cinema-control-icon" aria-label="Toggle Mute">
                            <span class="audio-status-text">
                                <svg class="dock-audio-icon" viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                                <svg class="audio-mute-cross" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
                                    <line x1="6" y1="6" x2="18" y2="18" stroke="#ff7766" stroke-width="2" stroke-linecap="round"></line>
                                    <line x1="18" y1="6" x2="6" y2="18" stroke="#ff7766" stroke-width="2" stroke-linecap="round"></line>
                                </svg>
                            </span>
                        </button>
                        <input type="range" id="volumeSlider" class="cinema-volume-slider" min="0" max="1" step="0.1" value="1">
                    </div>

                    <div class="time-display">
                        <span id="currentTime">00:00</span> / <span id="totalDuration">00:00</span>
                    </div>
                </div>

                <div class="controls-group">
                    <button id="fullscreenBtn" class="cinema-control-icon" aria-label="Toggle Fullscreen">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const videoHost = document.getElementById('shortFilmPlayer');
            if (!videoHost) return;

            const YOUTUBE_VIDEO_ID = 'FNDfSJdtq8A';

            const listenerMap = {
                play: [],
                pause: [],
                loadedmetadata: [],
                timeupdate: [],
                volumechange: []
            };

            const emit = (eventName) => {
                const listeners = listenerMap[eventName] || [];
                listeners.forEach((listener) => {
                    try {
                        listener();
                    } catch (_) {
                        // Keep player interactions resilient even if one listener fails.
                    }
                });
            };

            const isNativeVideo = videoHost.tagName === 'VIDEO';
            let media;
            let playerElement = videoHost;

            const registerListener = (eventName, handler) => {
                if (!listenerMap[eventName]) listenerMap[eventName] = [];
                listenerMap[eventName].push(handler);
            };

            const ensureYouTubeApi = () => {
                if (window.YT && window.YT.Player) {
                    return Promise.resolve();
                }

                return new Promise((resolve) => {
                    const previous = window.onYouTubeIframeAPIReady;
                    window.onYouTubeIframeAPIReady = () => {
                        if (typeof previous === 'function') previous();
                        resolve();
                    };

                    if (!document.querySelector('script[src="https://www.youtube.com/iframe_api"]')) {
                        const script = document.createElement('script');
                        script.src = 'https://www.youtube.com/iframe_api';
                        document.head.appendChild(script);
                    }
                });
            };

            if (isNativeVideo) {
                media = videoHost;
            } else {
                let ytPlayer = null;
                let ytReady = false;
                let timePoll = null;

                const startTimePoll = () => {
                    if (timePoll) return;
                    timePoll = setInterval(() => emit('timeupdate'), 250);
                };

                const stopTimePoll = () => {
                    if (!timePoll) return;
                    clearInterval(timePoll);
                    timePoll = null;
                };

                media = {
                    play() {
                        if (!ytReady) return;
                        ytPlayer.playVideo();
                    },
                    pause() {
                        if (!ytReady) return;
                        ytPlayer.pauseVideo();
                    },
                    get paused() {
                        if (!ytReady) return true;
                        return ytPlayer.getPlayerState() !== window.YT.PlayerState.PLAYING;
                    },
                    get currentTime() {
                        if (!ytReady) return 0;
                        return ytPlayer.getCurrentTime() || 0;
                    },
                    set currentTime(value) {
                        if (!ytReady) return;
                        ytPlayer.seekTo(value, true);
                        emit('timeupdate');
                    },
                    get duration() {
                        if (!ytReady) return 0;
                        return ytPlayer.getDuration() || 0;
                    },
                    get muted() {
                        if (!ytReady) return false;
                        return ytPlayer.isMuted();
                    },
                    set muted(value) {
                        if (!ytReady) return;
                        if (value) {
                            ytPlayer.mute();
                        } else {
                            ytPlayer.unMute();
                        }
                        emit('volumechange');
                    },
                    get volume() {
                        if (!ytReady) return 1;
                        return (ytPlayer.getVolume() || 100) / 100;
                    },
                    set volume(value) {
                        if (!ytReady) return;
                        const clamped = Math.max(0, Math.min(1, Number(value)));
                        ytPlayer.setVolume(Math.round(clamped * 100));
                        if (clamped === 0) {
                            ytPlayer.mute();
                        } else {
                            ytPlayer.unMute();
                        }
                        emit('volumechange');
                    },
                    addEventListener(eventName, handler) {
                        registerListener(eventName, handler);
                    }
                };

                ensureYouTubeApi().then(() => {
                    ytPlayer = new window.YT.Player('shortFilmPlayer', {
                        videoId: YOUTUBE_VIDEO_ID,
                        playerVars: {
                            rel: 0,
                            modestbranding: 1,
                            playsinline: 1,
                            controls: 0,
                            showinfo: 0,
                            iv_load_policy: 3
                        },
                        events: {
                            onReady: () => {
                                ytReady = true;
                                playerElement = videoHost.querySelector('iframe') || videoHost;
                                emit('loadedmetadata');
                                emit('volumechange');
                            },
                            onStateChange: (event) => {
                                if (event.data === window.YT.PlayerState.PLAYING) {
                                    emit('play');
                                    startTimePoll();
                                } else if (
                                    event.data === window.YT.PlayerState.PAUSED ||
                                    event.data === window.YT.PlayerState.ENDED
                                ) {
                                    emit('pause');
                                    stopTimePoll();
                                    emit('timeupdate');
                                }
                            }
                        }
                    });
                });
            }

            const onMedia = (eventName, handler) => {
                if (typeof media.addEventListener === 'function') {
                    media.addEventListener(eventName, handler);
                }
            };

            const attemptPlay = () => {
                if (typeof media.play !== 'function') return;
                const result = media.play();
                if (result && typeof result.catch === 'function') {
                    result.catch(() => {});
                }
            };

            const overlay = document.getElementById('pageTransitionOverlay');
            const videoPlayOverlay = document.getElementById('videoPlayOverlay');
            const hideOverlay = () => {
                if (!overlay) return;
                overlay.style.transition = 'opacity 1s ease';
                overlay.style.opacity = '0';
                overlay.style.pointerEvents = 'none';
                overlay.style.visibility = 'hidden';
                overlay.style.display = 'none';
                overlay.classList.remove('fade-to-black');
                overlay.classList.add('is-hidden');
            };
            const hideVideoPlayOverlay = () => {
                if (!videoPlayOverlay) return;
                videoPlayOverlay.style.opacity = '0';
                videoPlayOverlay.style.visibility = 'hidden';
                videoPlayOverlay.style.pointerEvents = 'none';
                videoPlayOverlay.classList.add('is-hidden');
            };

            hideOverlay();

            const container = document.getElementById('cinemaContainer');
            const bottomControls = document.querySelector('.cinema-bottom-controls');
            const playPauseBtn = document.getElementById('playPauseBtn');
            const playIcon = document.getElementById('playIcon');
            const pauseIcon = document.getElementById('pauseIcon');
            const volumeSlider = document.getElementById('volumeSlider');
            const fullscreenBtn = document.getElementById('fullscreenBtn');
            const timelineBar = document.querySelector('.timeline-bar');
            const timelineProgress = document.getElementById('timelineProgress');
            const timelineHandle = document.getElementById('timelineHandle');
            const currentTimeDisplay = document.getElementById('currentTime');
            const totalDurationDisplay = document.getElementById('totalDuration');

            function formatTime(seconds) {
                if (Number.isNaN(seconds)) return '00:00';
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }

            function syncIcons() {
                if (playIcon) playIcon.style.display = media.paused ? 'block' : 'none';
                if (pauseIcon) pauseIcon.style.display = media.paused ? 'none' : 'block';
            }

            function togglePlay(event) {
                if (event) event.preventDefault();
                if (event) event.stopPropagation();
                if (media.paused) {
                    attemptPlay();
                } else {
                    media.pause();
                }
                syncIcons();
                triggerPlayFeedback();
            }

            function triggerPlayFeedback() {
                const feedback = document.getElementById('playFeedback');
                if (!feedback) return;
                const icon = media.paused ? 'pause' : 'play';
                feedback.classList.remove('is-visible');
                void feedback.offsetWidth;
                feedback.classList.add('is-visible');
                feedback.setAttribute('data-state', icon);
                clearTimeout(triggerPlayFeedback.timeout);
                triggerPlayFeedback.timeout = setTimeout(() => {
                    feedback.classList.remove('is-visible');
                }, 700);
            }

            playPauseBtn?.addEventListener('click', togglePlay);
            videoHost.addEventListener('click', togglePlay);
            videoPlayOverlay?.addEventListener('click', () => {
                if (media.paused) {
                    attemptPlay();
                }
            });

            onMedia('play', () => {
                syncIcons();
                hideOverlay();
                hideVideoPlayOverlay();
            });
            onMedia('pause', syncIcons);
            onMedia('loadedmetadata', () => {
                if (totalDurationDisplay) totalDurationDisplay.textContent = formatTime(media.duration);
            });
            onMedia('timeupdate', () => {
                if (!media.duration) return;
                const percentage = (media.currentTime / media.duration) * 100;
                if (timelineProgress) timelineProgress.style.width = `${percentage}%`;
                if (timelineHandle) timelineHandle.style.left = `${percentage}%`;
                if (currentTimeDisplay) currentTimeDisplay.textContent = formatTime(media.currentTime);
                if (media.currentTime >= 4) {
                    hideOverlay();
                    hideVideoPlayOverlay();
                }
            });

            setTimeout(() => {
                hideOverlay();
                hideVideoPlayOverlay();
            }, 4500);

            timelineBar?.addEventListener('click', (event) => {
                const rect = timelineBar.getBoundingClientRect();
                const clickPosition = (event.clientX - rect.left) / rect.width;
                media.currentTime = clickPosition * media.duration;
            });

            volumeSlider?.addEventListener('input', (event) => {
                media.volume = Number(event.target.value);
                media.muted = media.volume === 0;
            });

            fullscreenBtn?.addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    container?.requestFullscreen().catch(() => {});
                } else {
                    document.exitFullscreen();
                }
            });

            const cursor = document.getElementById('blobCursor');
            const setCursorDarkened = (isDark) => {
                if (!cursor) return;
                cursor.classList.toggle('is-darkened', isDark);
            };

            videoHost.addEventListener('mouseenter', () => setCursorDarkened(true));
            videoHost.addEventListener('mouseleave', () => setCursorDarkened(false));

            const showCursor = () => {
                if (!document.fullscreenElement) {
                    if (cursor) cursor.style.opacity = '1';
                    if (cursor) cursor.style.visibility = 'visible';
                }
            };
            const hideCursor = () => {
                if (cursor) cursor.style.opacity = '0';
                if (cursor) cursor.style.visibility = 'hidden';
            };

            document.addEventListener('mousemove', showCursor);
            document.addEventListener('mousedown', showCursor);
            document.addEventListener('keydown', showCursor);
            document.addEventListener('fullscreenchange', () => {
                if (document.fullscreenElement) {
                    hideCursor();
                } else {
                    showCursor();
                }
            });
            if (document.fullscreenElement) {
                hideCursor();
            } else {
                showCursor();
            }

            let controlsTimeout;
            const showControls = () => {
                if (!container) return;
                container.classList.add('controls-visible');
                if (controlsTimeout) clearTimeout(controlsTimeout);
                controlsTimeout = setTimeout(() => {
                    container.classList.remove('controls-visible');
                }, 2200);
            };
            const hideControls = () => {
                if (!container) return;
                container.classList.remove('controls-visible');
                if (controlsTimeout) clearTimeout(controlsTimeout);
            };

            container?.addEventListener('mousemove', showControls);
            container?.addEventListener('mouseleave', hideControls);
            videoHost.addEventListener('mouseenter', showControls);
            videoHost.addEventListener('mousemove', showControls);
            videoHost.addEventListener('mouseleave', hideControls);

            showControls();
            syncIcons();
            
            const muteBtn = document.getElementById('muteBtn');
            if (muteBtn) {
                const syncAudioButton = () => {
                    muteBtn.classList.toggle('is-muted', media.muted);
                };
                muteBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    media.muted = !media.muted;
                    syncAudioButton();
                });
                onMedia('volumechange', syncAudioButton);
                syncAudioButton();
            }

            onMedia('timeupdate', () => {
                if (media.currentTime >= 4 && overlay) {
                    overlay.style.transition = 'opacity 1s ease';
                    overlay.style.opacity = '0';
                    overlay.style.pointerEvents = 'none';
                }
            });
        });
    </script>

    <script type="module" src="script.js"></script>
    <footer class="shared-screen-bar bottom-bar">
        <span class="bar-meta">WHAT WAS ALWAYS THERE</span>
        <span class="bar-meta">MOTION / CINEMA</span>
    </footer>
</body>
